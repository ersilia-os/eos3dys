Identifier: eos3dys
Slug: coadd-antimicrobial-activity
Status: In progress
Title: CoADD antimicrobial prediction
Description: Array of ML models based on the CoADD data. We have built 
  individual models for each organism and strain for which sufficient data (>100
  compounds) is available. Additional cytotoxicity models have also been added. 
  Cut-offs for binary activity are determined at 50% for percentage of 
  inhibition and 25 uM for dose-response assays. All models achieved an AUROC > 
  0.7 using the LazyQSAR package. Detailed analysis is available in this 
  [repository](https://github.com/ersilia-os/coadd-binary-tasks)
